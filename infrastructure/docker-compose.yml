services:
  # ==========================================
  # HỆ SINH THÁI DATA LAKEHOUSE HIỆN TẠI
  # ==========================================
  mc:
    depends_on:
      - minio
    image: minio/mc:latest
    container_name: mc
    environment:
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_REGION=us-east-1
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set minio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}) do echo '...waiting...' && sleep 1; done;
      /usr/bin/mc rm -r --force minio/warehouse || true;
      /usr/bin/mc mb minio/warehouse || true;
      /usr/bin/mc policy set public minio/warehouse;
      tail -f /dev/null
      "      
    networks:
      iceberg_net:

  minio:
    image: minio/minio:latest
    container_name: minio
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_DOMAIN=minio
    ports:
      - 9001:9001
      - 9000:9000
    command: ["server", "/data", "--console-address", ":9001"]
    networks:
      iceberg_net:
    volumes:
      - minio-data:/data

  nessie:
    image: projectnessie/nessie:0.50.0
    container_name: nessie
    ports:
      - 19120:19120
    networks:
      iceberg_net:

  spark-iceberg:
    image: tabulario/spark-iceberg # <-- Thay vì tự build, dùng luôn image chuẩn này
    container_name: spark-iceberg
    environment:
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_REGION=us-east-1
      - AWS_S3_ENDPOINT=http://minio:9000
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo '📦 Downloading Kafka JARs...' &&
        wget -q -P /opt/spark/jars/ https://repo1.maven.org/maven2/org/apache/spark/spark-sql-kafka-0-10_2.12/3.5.1/spark-sql-kafka-0-10_2.12-3.5.1.jar &&
        wget -q -P /opt/spark/jars/ https://repo1.maven.org/maven2/org/apache/spark/spark-token-provider-kafka-0-10_2.12/3.5.1/spark-token-provider-kafka-0-10_2.12-3.5.1.jar &&
        wget -q -P /opt/spark/jars/ https://repo1.maven.org/maven2/org/apache/kafka/kafka-clients/3.4.0/kafka-clients-3.4.0.jar &&
        wget -q -P /opt/spark/jars/ https://repo1.maven.org/maven2/org/apache/commons/commons-pool2/2.12.0/commons-pool2-2.12.0.jar &&
        echo '✅ JAR download complete!' &&
        cd /opt/spark && ./entrypoint.sh notebook
    volumes:
      - ../warehouse:/home/iceberg/warehouse
      - ../notebooks:/home/iceberg/notebooks/notebooks
      - ../data_source:/home/iceberg/data
    ports:
      - 8888:8888
      - 8080:8080
      - 10000:10000
      - 10001:10001
    networks:
      iceberg_net:

  dremio:
    image: dremio/dremio-oss:24.0.0
    container_name: dremio
    user: dremio
    environment:
      - DREMIO_MAX_MEMORY_SIZE_MB=8192
    ports:
      - 9047:9047
      - 31010:31010
      - 32010:32010
    networks:
      iceberg_net:

# ==========================================
  # THÊM MỚI: HẠ TẦNG KAFKA (CONFLUENT - CHUẨN CÔNG NGHIỆP)
  # ==========================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      iceberg_net:

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      iceberg_net:

networks:
  iceberg_net:

volumes:
  minio-data:
  maven-cache: